<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>かずよみ</title>
<style>
  :root {
    --bg: #f7f7f7;
    --panel: #ffffff;
    --shadow: 0 8px 20px rgba(0,0,0,.10);
    --radius: 16px;
    --dark: #111;
    --ok: #0f8a2b;
    --ng: #e0453a;
    --hi: #ddeeff;
    --line: #222;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: system-ui, -apple-system, "Noto Sans JP", sans-serif;
    background: var(--bg);
    color: var(--dark);
  }
  .wrap { max-width: 520px; margin: 0 auto; padding: 12px; }
  .panel {
    background: var(--panel);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 14px 12px 20px;
  }

  /* タイトル行 */
  .titleRow { position:relative; min-height:44px; margin-bottom:14px; }
  .title { font-weight:950; font-size:20px; margin:0; text-align:center; line-height:44px; }
  .soundBtn {
    position:absolute; right:0; top:0;
    border:0; border-radius:14px;
    display:inline-flex; align-items:center; gap:6px;
    padding:10px 12px; font-size:14px; font-weight:900;
    cursor:pointer; background:#f1f1f1; color:var(--dark); line-height:1;
  }
  .soundBtn.off { background:#e9e9e9; color:#666; }

  /* 位テーブル */
  table.place { width:100%; border-collapse:collapse; table-layout:fixed; }
  .arrow-row td {
    text-align:center; font-size:1.8rem; line-height:1; height:2rem; padding:0;
    color:#4a9eff;
  }
  table.place th {
    font-size:1rem; font-weight:600; padding:6px 0; text-align:center; visibility:hidden;
  }
  body.hint-on table.place th { visibility:visible; color:#555; }
  table.place td {
    border-left:3px solid transparent; border-right:3px solid transparent;
    text-align:center; vertical-align:top;
  }
  table.place td:first-child { border-left:none; }
  table.place td:last-child  { border-right:none; }
  body.hint-on table.place td { border-left-color:var(--line); border-right-color:var(--line); }
  body.hint-on table.place td:first-child { border-left:none; }
  body.hint-on table.place td:last-child  { border-right:none; }
  .digit {
    font-size:4rem; line-height:1.2; border-bottom:4px solid transparent;
    border-radius:10px; transition:background .15s; padding:2px 0;
  }
  body.hint-on .digit { border-bottom-color:var(--line); }
  .digit.active { background:var(--hi); }

  /* コインエリア */
  .coins { min-height:60px; padding-top:8px; }
  .coins > * { visibility:hidden; height:0; overflow:hidden; }
  body.hint-on .coins > * { visibility:visible; height:auto; overflow:visible; }
  body.hint-on .coins { min-height:30vh; }
  .coinGroup {
    display:flex; gap:4%; justify-content:flex-start; align-items:flex-end;
    height:100%; padding:0 4px;
  }
  .coinCol { display:flex; flex-direction:column-reverse; align-items:center; gap:4px; flex:0 0 46%; }
  .coinImg { width:100%; max-width:64px; object-fit:contain; user-select:none; pointer-events:none; }
  .empty { display:flex; align-items:flex-start; justify-content:center; height:100%; padding-top:8px; }
  .empty span { color:#bbb; font-size:.9rem; border:2px dashed #ccc; border-radius:10px; padding:6px 10px; }

  /* 結果 */
  .resultArea { text-align:center; margin-top:8px; min-height:3.5rem; }
  .result { font-size:2.2rem; font-weight:700; min-height:2rem; }
  .result.ok { color:var(--ok); }
  .result.ng { color:var(--ng); }
  .heard { color:#888; font-size:.85rem; min-height:1.2rem; margin-top:2px; }

  /* 聴き取りゲージ */
  .gauge-wrap {
    height:6px; border-radius:3px; background:#e8e8e8;
    margin:10px 12px 0; overflow:hidden; opacity:0;
    transition:opacity .2s;
  }
  .gauge-wrap.visible { opacity:1; }
  .gauge-bar {
    height:100%; width:100%; border-radius:3px;
    background:#4a9eff; transform-origin:left;
    transform:scaleX(1);
  }
  .gauge-bar.running {
    transition:transform linear;
  }

  /* コントロール */
  .controls {
    display:flex; gap:10px; align-items:center; margin-top:14px;
    flex-wrap:wrap; justify-content:center;
  }
  .micBtn {
    border:0; border-radius:14px; font-weight:950; cursor:pointer;
    padding:14px 22px; font-size:18px;
    background:var(--dark); color:#fff; min-width:160px;
    transition:opacity .12s;
  }
  .micBtn:disabled { opacity:.55; cursor:not-allowed; }
  .hintBtn {
    border:0; border-radius:12px; padding:10px 14px;
    font-size:14px; font-weight:900; cursor:pointer;
    background:#f1f1f1; color:var(--dark);
  }
  .hintBtn.active { background:#ffe066; }
  .skipBtn {
    border:0; border-radius:12px; padding:10px 16px;
    font-size:14px; font-weight:900; cursor:pointer;
    background:#e8f4ff; color:#226;
  }

  /* アニメーション */
  @keyframes victory {
    0%  { transform:scale(0.3); opacity:0; }
    50% { transform:scale(1.35); opacity:1; }
    70% { transform:scale(0.92); }
    100%{ transform:scale(1); opacity:1; }
  }
  .result.victory {
    font-size:2.6rem;
    animation:victory .55s cubic-bezier(.36,.07,.19,.97) both;
    color:#e8a000;
  }
  .star {
    position:fixed; font-size:1.8rem; pointer-events:none; z-index:99;
    animation:flystar .7s ease-out forwards;
  }
  @keyframes flystar {
    0%  { opacity:1; transform:translate(0,0) scale(1); }
    100%{ opacity:0; transform:translate(var(--dx),var(--dy)) scale(0.4); }
  }

  @media (max-width: 480px) {
    .wrap { padding:6px; }
    .panel { padding:10px 8px 16px; }
    .titleRow { min-height:36px; margin-bottom:10px; }
    .title { font-size:17px; line-height:36px; }
    .soundBtn { font-size:12px; padding:8px 10px; }
    .digit { font-size:3.2rem; }
    .coins { min-height:22vh; }
    .micBtn { font-size:16px; padding:12px 18px; min-width:140px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="panel">
    <div class="titleRow">
      <p class="title">かずを こえで よもう</p>
      <button id="soundBtn" class="soundBtn" type="button">
        <span id="soundIcon">🔊</span>
        <span id="soundLabel">おと ON</span>
      </button>
    </div>

    <table class="place">
      <thead><tr><th>百のくらい</th><th>十のくらい</th><th>一のくらい</th></tr></thead>
      <tbody>
        <tr class="arrow-row">
          <td id="a100"></td><td id="a10"></td><td id="a1"></td>
        </tr>
        <tr>
          <td class="digit" id="d100"></td>
          <td class="digit" id="d10"></td>
          <td class="digit" id="d1"></td>
        </tr>
        <tr>
          <td class="coins" id="c100"></td>
          <td class="coins" id="c10"></td>
          <td class="coins" id="c1"></td>
        </tr>
      </tbody>
    </table>

    <div class="resultArea">
      <div class="result" id="result"></div>
      <div class="heard"  id="heard"></div>
    </div>

    <!-- 聴き取りゲージ -->
    <div class="gauge-wrap" id="gaugeWrap">
      <div class="gauge-bar" id="gaugeBar"></div>
    </div>

    <div class="controls">
      <button id="mic"     class="micBtn"  type="button">🎤 よむ</button>
      <button id="yomanai" class="skipBtn" type="button" style="display:none">読まない ▶</button>
      <button id="hint"    class="hintBtn" type="button">💡 ヒント</button>
    </div>
  </div>
</div>

<script src="judge.js"></script>
<script>
  // ===== 定数 =====
  const LISTEN_TIMEOUT_MS = 5000;   // 認識タイムアウト（ms）

  // ===== 状態 =====
  let current     = 365;
  let phase       = 0;        // 0=百, 1=十, 2=一
  let hintActive  = false;
  let recognizing = false;
  let soundOn     = localStorage.getItem('kazuYomiSoundOn') !== 'off';
  let gaugeTimer  = null;
  let currentRec  = null;     // 現在のSRインスタンス（abort用）

  const $ = id => document.getElementById(id);

  const PLACES = [
    { arrow:'a100', digit:'d100', coins:'c100' },
    { arrow:'a10',  digit:'d10',  coins:'c10'  },
    { arrow:'a1',   digit:'d1',   coins:'c1'   },
  ];

  function placeValue(n, p) {
    if (p === 0) return Math.floor(n / 100) * 100;
    if (p === 1) return Math.floor(n / 10) % 10 * 10;
    return n % 10;
  }

  // ===== サウンド =====
  let audioCtx = null;
  function getCtx() {
    const Cls = window.AudioContext || window.webkitAudioContext;
    if (!Cls) return null;
    if (!audioCtx) audioCtx = new Cls();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    return audioCtx;
  }
  function beep({ freq=880, dur=0.08, type='sine', gain=0.03, when=0 }) {
    if (!soundOn) return;
    const ctx = getCtx(); if (!ctx) return;
    const now = ctx.currentTime + when;
    const osc = ctx.createOscillator();
    const amp = ctx.createGain();
    osc.type = type; osc.frequency.setValueAtTime(freq, now);
    amp.gain.setValueAtTime(0.0001, now);
    amp.gain.exponentialRampToValueAtTime(gain, now + 0.01);
    amp.gain.exponentialRampToValueAtTime(0.0001, now + dur);
    osc.connect(amp); amp.connect(ctx.destination);
    osc.start(now); osc.stop(now + dur + 0.02);
  }
  function playPhaseCorrect() { beep({ freq:660, dur:0.07, gain:0.025 }); }
  function playVictory() {
    beep({ freq:880,  dur:0.08, gain:0.035, when:0    });
    beep({ freq:1100, dur:0.08, gain:0.03,  when:0.09 });
    beep({ freq:1320, dur:0.12, gain:0.035, when:0.18 });
  }
  function playWrong() { beep({ freq:180, dur:0.12, type:'triangle', gain:0.03 }); }

  function updateSoundBtn() {
    $('soundBtn').classList.toggle('off', !soundOn);
    $('soundIcon').textContent = soundOn ? '🔊' : '🔇';
    $('soundLabel').textContent = soundOn ? 'おと ON' : 'おと OFF';
  }

  // ===== ゲージ =====
  function showGauge(durationMs) {
    const wrap = $('gaugeWrap');
    const bar  = $('gaugeBar');
    bar.style.transition = 'none';
    bar.style.transform  = 'scaleX(1)';
    wrap.classList.add('visible');
    // 次フレームで transition を付けて縮小開始
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        bar.style.transition = `transform ${durationMs}ms linear`;
        bar.style.transform  = 'scaleX(0)';
      });
    });
  }
  function hideGauge() {
    $('gaugeWrap').classList.remove('visible');
    $('gaugeBar').style.transition = 'none';
    $('gaugeBar').style.transform  = 'scaleX(1)';
  }

  // ===== 表示 =====
  function renderNumber(n) {
    $('d100').textContent = Math.floor(n / 100) % 10;
    $('d10').textContent  = Math.floor(n / 10) % 10;
    $('d1').textContent   = n % 10;
  }

  const COIN_FILE = { 100:'imgs/money_100.png', 10:'imgs/money_10.png', 1:'imgs/money_1.png' };
  function renderOnePlace(el, file, count) {
    el.textContent = '';
    if (count === 0) { el.innerHTML = '<div class="empty"><span>０まい</span></div>'; return; }
    const group = document.createElement('div');
    group.className = 'coinGroup';
    (count <= 5 ? [count] : [5, count - 5]).forEach(n => {
      const col = document.createElement('div');
      col.className = 'coinCol';
      for (let i = 0; i < n; i++) {
        const img = document.createElement('img');
        img.className = 'coinImg'; img.src = file; img.alt = '';
        col.appendChild(img);
      }
      group.appendChild(col);
    });
    el.appendChild(group);
  }
  function renderCoins() {
    renderOnePlace($('c100'), COIN_FILE[100], Math.floor(current / 100) % 10);
    renderOnePlace($('c10'),  COIN_FILE[10],  Math.floor(current / 10) % 10);
    renderOnePlace($('c1'),   COIN_FILE[1],   current % 10);
  }

  function setHint(on) {
    hintActive = on;
    document.body.classList.toggle('hint-on', on);
    $('hint').classList.toggle('active', on);
    $('hint').textContent = on ? '💡 ヒント ON' : '💡 ヒント';
  }

  // ===== 星エフェクト =====
  function launchStars() {
    const dirs = [[-90,-80],[90,-80],[0,-100],[-120,-40],[120,-40],[-60,-110],[60,-110],[0,-120]];
    const cx = window.innerWidth / 2, cy = window.innerHeight * 0.38;
    dirs.forEach(([dx, dy], i) => {
      const s = document.createElement('div');
      s.className = 'star';
      s.textContent = ['★','✨','⭐'][i % 3];
      s.style.left = cx + 'px'; s.style.top = cy + 'px';
      s.style.setProperty('--dx', dx + 'px');
      s.style.setProperty('--dy', dy + 'px');
      s.style.animationDelay = (i * 0.04) + 's';
      document.body.appendChild(s);
      setTimeout(() => s.remove(), 900);
    });
  }

  // ===== フェーズ制御 =====
  function startPhase(p) {
    phase = p;
    PLACES.forEach((pl, i) => {
      $(pl.arrow).textContent = i === p ? '▼' : '';
      $(pl.digit).classList.toggle('active', i === p);
    });
    const val = placeValue(current, p);
    $('result').textContent = '';
    $('result').className = 'result';
    $('heard').textContent = '';
    if (val === 0) {
      $('mic').style.display = 'none';
      $('yomanai').style.display = '';
    } else {
      $('mic').style.display = '';
      $('yomanai').style.display = 'none';
      $('mic').textContent = '🎤 よむ';
      $('mic').disabled = false;
    }
  }

  function advanceAuto() {
    const next = phase + 1;
    if (next > 2) {
      PLACES.forEach(pl => {
        $(pl.arrow).textContent = '';
        $(pl.digit).classList.remove('active');
      });
      $('mic').style.display = '';
      $('mic').textContent = '🎤 よむ';
      $('mic').disabled = false;
      $('yomanai').style.display = 'none';
      $('result').textContent = '○ せいかい！';
      $('result').className = 'result victory';
      $('heard').textContent = '';
      launchStars();
      playVictory();
      setTimeout(newProblem, 1500);
      return;
    }

    phase = next;
    PLACES.forEach((pl, i) => {
      $(pl.arrow).textContent = i === next ? '▼' : '';
      $(pl.digit).classList.toggle('active', i === next);
    });
    $('result').textContent = '';
    $('result').className = 'result';
    $('heard').textContent = '';

    const val = placeValue(current, next);
    if (val === 0) {
      $('mic').style.display = 'none';
      $('yomanai').style.display = '';
      setTimeout(() => {
        $('result').textContent = '読まない ✓';
        $('result').className = 'result ok';
        setTimeout(advanceAuto, 180);
      }, 150);
    } else {
      $('mic').style.display = '';
      $('yomanai').style.display = 'none';
      setTimeout(startListen, 80);
    }
  }

  function onCorrect(said) {
    $('heard').textContent = said ? `きこえた：「${said}」` : '';
    $('result').textContent = '✓';
    $('result').className = 'result ok';
    playPhaseCorrect();
    setTimeout(advanceAuto, 180);
  }

  function onWrong(said) {
    $('heard').textContent = said ? `きこえた：「${said}」` : '';
    $('result').textContent = '× もういちど';
    $('result').className = 'result ng';
    playWrong();
    setHint(true);
    speakModel(placeValue(current, phase));
    $('mic').textContent = '🎤 もういちど';
    $('mic').disabled = false;
  }

  // ===== 問題生成 =====
  function newProblem() {
    // 百の位：1〜9（0なし）、十・一の位：0〜9
    const h = 1 + Math.floor(Math.random() * 9);
    const t = Math.floor(Math.random() * 10);
    const o = Math.floor(Math.random() * 10);
    current = h * 100 + t * 10 + o;
    renderNumber(current);
    renderCoins();
    setHint(false);
    startPhase(0);
    // 百の位は必ず1〜9なので自動リスン開始
    setTimeout(startListen, 100);
  }

  // ===== 音声入力 =====
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;

  function speakModel(n) {
    if (!('speechSynthesis' in window)) return;
    const u = new SpeechSynthesisUtterance(readingKana(n));
    u.lang = 'ja-JP'; u.rate = 0.85;
    speechSynthesis.cancel(); speechSynthesis.speak(u);
  }

  function rank(kind) { return { match:0, bara:1, wrong:2, unclear:3 }[kind]; }

  // 繰り返し認識の検出：「さんびゃくさんびゃく」→正解
  function stripRepeats(text, kana) {
    if (!kana) return text;
    const re = new RegExp(kana, 'g');
    return text.replace(/\s/g, '').replace(re, '');
  }

  function stopGaugeTimer() {
    if (gaugeTimer) { clearTimeout(gaugeTimer); gaugeTimer = null; }
  }

  function finishListening() {
    stopGaugeTimer();
    hideGauge();
    recognizing = false;
    $('mic').disabled = false;
    if ($('mic').textContent === '🎙 きいてるよ…') $('mic').textContent = '🎤 よむ';
  }

  function startListen() {
    if (!SR) { $('heard').textContent = 'このブラウザは音声に未対応（Chrome推奨）'; return; }
    if (recognizing) return;
    const target = placeValue(current, phase);
    if (target === 0) return;

    const rec = new SR();
    currentRec = rec;
    rec.lang = 'ja-JP';
    rec.interimResults = false;
    rec.maxAlternatives = 3;
    recognizing = true;
    $('mic').textContent = '🎙 きいてるよ…';
    $('mic').disabled = true;
    $('result').textContent = '';
    $('result').className = 'result';
    $('heard').textContent = '';

    // ゲージ開始
    showGauge(LISTEN_TIMEOUT_MS);

    // タイムアウト：時間切れで認識中止 → よむボタンを返す
    gaugeTimer = setTimeout(() => {
      if (recognizing) {
        try { rec.abort(); } catch(e) {}
        hideGauge();
        recognizing = false;
        $('mic').textContent = '🎤 よむ';
        $('mic').disabled = false;
        $('heard').textContent = 'もう一度「よむ」を押してね';
      }
    }, LISTEN_TIMEOUT_MS);

    rec.onresult = e => {
      const alts = Array.from(e.results[0]).map(r => r.transcript);
      const kana  = readingKana(target);
      let best = null;

      for (const a of alts) {
        const norm = a.replace(/\s/g, '');

        // 繰り返し認識対策：kana を除去して残りが空または超短なら正解扱い
        const stripped = stripRepeats(norm, kana);
        if (stripped.length === 0 || (norm.length > kana.length && stripped.length <= 2)) {
          best = { ok: true, kind: 'match', said: a };
          break;
        }

        const v = judge(a, target);
        if (!best || rank(v.kind) < rank(best.kind)) best = { ...v, said: a };
        if (v.kind === 'match') break;
      }

      finishListening();
      if (best && best.ok) onCorrect(best.said);
      else onWrong(best ? best.said : '');
    };

    rec.onerror = () => {
      finishListening();
      $('heard').textContent = 'もう一度ためしてね';
    };

    rec.onend = () => {
      // onresult が先に呼ばれた場合は finishListening() 済みなので二重実行にならない
      if (recognizing) finishListening();
    };

    rec.start();
  }

  // ===== イベント =====
  $('mic').addEventListener('click', startListen);

  $('yomanai').addEventListener('click', () => {
    $('result').textContent = '読まない ✓';
    $('result').className = 'result ok';
    $('heard').textContent = '';
    setTimeout(advanceAuto, 350);
  });

  $('hint').addEventListener('click', () => setHint(!hintActive));

  $('soundBtn').addEventListener('click', () => {
    soundOn = !soundOn;
    localStorage.setItem('kazuYomiSoundOn', soundOn ? 'on' : 'off');
    updateSoundBtn();
  });

  // ===== 初期化 =====
  updateSoundBtn();
  renderNumber(current);
  renderCoins();
  startPhase(0);
  setTimeout(startListen, 300);
</script>
</body>
</html>
